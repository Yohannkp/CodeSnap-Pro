<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>CodeSnap Pro</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; width: 320px; padding: 16px; background: #1a1a2e; color: #fff; }
    .header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
    .logo { width: 32px; height: 32px; background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; }
    h1 { font-size: 16px; font-weight: 600; }
    .btn { width: 100%; padding: 12px; background: linear-gradient(135deg, #667eea, #764ba2); border: none; border-radius: 8px; color: white; font-weight: 600; cursor: pointer; margin-top: 8px; }
    .btn:hover { opacity: 0.9; }
    .info { font-size: 12px; color: #888; margin-top: 12px; text-align: center; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">CS</div>
    <h1>CodeSnap Pro</h1>
  </div>
  <button class="btn" id="captureBtn">📸 Capturer cette page</button>
  <p class="info">Version gratuite - 5 captures/jour</p>
  <script src="popup.js"></script>
</body>
</html>
